name: Lint, Format, and Test

on:
  pull_request:
    branches:
      - main

jobs:
  lint-format-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important: fetch-depth 0 is needed to detect changes

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: days/**

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run Lint, Format, and Test on modified folders
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          # 1. Get unique directory names for changed files inside days/
          # This filters for directories like 'days/day_14_production_app'
          DIRS=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | xargs -n 1 dirname | grep -E '^days/day_[0-9]+' | sort -u)
          
          if [ -n "$DIRS" ]; then
            echo "Processing modified directories: $DIRS"
            
            # 2. Run Ruff on changed directories
            ruff check $DIRS
            
            # 3. Run Ruff format on changed directories
            ruff format --check $DIRS
            
            # 4. Run Pytest on changed directories
            # Note: --cov=days is kept so coverage maps back to the source correctly
            pytest $DIRS --cov=days --cov-report=xml --cov-report=term-missing
          else
            echo "Changes were outside of day-specific folders. Skipping specific checks."
          fi

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        # Only upload if tests actually ran and generated a report
        if: matrix.python-version == '3.11' && steps.changed-files.outputs.any_changed == 'true'