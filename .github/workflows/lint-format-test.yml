name: Lint, Format, and Test

on:
  pull_request:
    branches:
      - main

jobs:
  lint-format-test-matrix:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: days/**

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run Quality Checks and Tests
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          # 1. Extract the specific Day directories
          DIRS=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | xargs -n 1 dirname | grep -E '^days/day_[0-9]+' | sort -u)
          
          if [ -n "$DIRS" ]; then
            echo "Processing modified directories: $DIRS"
            
            # 2. Run Ruff (Checks for logic errors/unused imports)
            ruff check $DIRS
            
            # 3. Run Ruff format on changed directories
            ruff format --check $DIRS
            
            # 4. Run Pytest
            # We add --cov-report=xml to ensure Codecov finds the file
            pytest --cov=days --cov-report=xml $DIRS
          else
            echo "No day-specific folders modified."
          fi

  # Aggregator job — matches the branch protection rule check name exactly
  lint-format-test:
    runs-on: ubuntu-latest
    needs: lint-format-test-matrix
    if: always()
    steps:
      - name: All matrix jobs passed
        run: |
          if [ "${{ needs.lint-format-test-matrix.result }}" != "success" ]; then
            echo "One or more matrix jobs failed"
            exit 1
          fi
          echo "All matrix jobs passed"
