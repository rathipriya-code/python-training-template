name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Format, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check formatting (black)
        run: black --check days/

      - name: Lint (ruff)
        run: ruff check days/

      - name: Type check (mypy)
        run: mypy days/

      - name: Run tests
        run: pytest
