repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-changed-days
        # Filter directories matching 'days/day_XX', then run pytest on them
        entry: bash -c 'dirs=$(echo "$@" | xargs -n1 dirname | grep -E "^days/day_[0-9]+" | sort -u); if [ -n "$dirs" ]; then pytest $dirs; else echo "No matching day folders changed."; fi' --
        language: system
        pass_filenames: true
        always_run: false
        files: ^days/day_[0-9]+/  # Only trigger if files inside these folders change