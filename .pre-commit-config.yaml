repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
      
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest
        entry: pytest $(echo "${{ steps.changed-files.outputs.all_changed_files }}" | xargs -n 1 dirname | grep -E '^days/day_[0-9]+' | sort -u)
        language: system
        types: [python]
        stages: [commit]
        pass_filenames: true
        always_run: false
